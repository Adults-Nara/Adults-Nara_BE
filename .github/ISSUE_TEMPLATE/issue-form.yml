name: "이슈 생성"
description: "Repo에 이슈를 생성하며, 생성된 이슈는 Jira와 연동됩니다."
title: "이슈 이름을 작성해주세요"
labels: ["feat"]

body:
  - type: input
    id: parentKey
    attributes:
      label: "🎟️ 상위 작업 (Ticket Number)"
      description: "상위 작업의 Ticket Number를 기입해주세요"
      placeholder: "ASN-0"
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: "🌿 Branch base name"
      description: "예: feature/users/login 또는 fix/auth/token"
      placeholder: "feature/users/login"
    validations:
      required: false

  - type: input
    id: description
    attributes:
      label: "📝 상세 내용"
      description: "이슈에 대해서 간략히 설명해주세요"
      placeholder: "예: 로그인 API에서 토큰 만료 처리 추가"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 체크리스트"
      description: "해당 이슈에 대해 필요한 체크리스트"
      value: |
        - [ ] 이슈의 목적을 명확히 이해하고 구현했는가?
        - [ ] 필요한 테스트 코드를 작성하거나 수정했는가?
        - [ ] 코드 컨벤션 및 스타일 가이드를 준수했는가?
        - [ ] 빌드 및 로컬 테스트가 정상적으로 통과하는가?
    validations:
      required: true
