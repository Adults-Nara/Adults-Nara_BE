have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  language: ko-KR
  system_prompt: "코드 리뷰 코멘트와 PR 요약은 항상 한국어(Korean)로만 작성해 주세요."
  comment_severity_threshold: MEDIUM
  max_review_comments: 50
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: true

ignore_patterns:
  - "**/build/**"
  - "**/.gradle/**"
  - "**/generated/**"
